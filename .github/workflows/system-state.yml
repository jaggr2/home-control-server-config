name: Get System State

on:
  push:
    branches: [main]
    paths:
      - 'docker-compose.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Get device state via Cloudflare Tunnel
        run: |
          # Stream to both stdout and capture to file
          curl -X POST \
            -u "${{ secrets.WEBHOOK_USER }}:${{ secrets.WEBHOOK_PASSWORD }}" \
            -H "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            --no-progress-meter \
            --retry 3 \
            --retry-delay 5 \
            "https://derog-hc-deploy.jaggi.xyz/ps.sh?run_id=${{ github.run_id }}&repo=${{ github.repository }}&sha=${{ github.sha }}" \
            | tee /tmp/webhook_response.txt

          echo " "
          echo "----- Webhookd request completed ------"
          echo " "

