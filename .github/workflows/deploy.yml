name: Update and Deploy Containers

on:
  push:
    branches: [main]
    paths:
      - 'docker-compose.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v40.1.0
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}

  deploy:
    needs: renovate
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Test connection to Cloudflare Tunnel
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            --max-time 10 \
            -u "${{ secrets.WEBHOOK_USER }}:${{ secrets.WEBHOOK_PASSWORD }}" \
            -H "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            -H "X-Hook-Mode: buffered" \
            "https://derog-hc-deploy.jaggi.xyz/health.sh?run_id=${{ github.run_id }}")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)

          if [ "$http_code" -eq 200 ] && [ "$body" = "OK" ]; then
            echo "✅ Webhookd is healthy"
          else
            echo "❌ Health check failed"
            echo "  Expected: HTTP 200 with body 'OK'"
            echo "  Got: HTTP $http_code with body '$body'"
            exit 1
          fi

      - name: Trigger device update via Cloudflare Tunnel
        run: |
          # Stream to both stdout and capture to file
          curl -X POST \
            -u "${{ secrets.WEBHOOK_USER }}:${{ secrets.WEBHOOK_PASSWORD }}" \
            -H "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            --no-progress-meter \
            --retry 3 \
            --retry-delay 5 \
            "https://derog-hc-deploy.jaggi.xyz/apply-config.sh?run_id=${{ github.run_id }}&repo=${{ github.repository }}&sha=${{ github.sha }}" \
            | tee /tmp/webhook_response.txt

          echo " "
          echo "----- Webhookd request completed ------"
          echo " "

          # Check the last line for exit status
          last_line=$(tail -n 1 /tmp/webhook_response.txt)
          if [[ "$last_line" =~ ^error:\ exit\ status\ ([0-9]+) ]]; then
            exit_code="${BASH_REMATCH[1]}"
            if [[ "$exit_code" -ne 0 ]]; then
              echo "❌ Script failed with exit status $exit_code"
              exit "$exit_code"
            else
              echo "✅ Script executed successfully with exit status 0"
            fi
          else
            echo "⚠️ Could not determine script exit status from response"
            exit 1
          fi
