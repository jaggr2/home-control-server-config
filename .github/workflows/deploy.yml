name: Update and Deploy Containers

on:
  push:
    branches: [main]
    paths:
      - 'docker-compose.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v40.1.0
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}

  deploy:
    needs: renovate
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Trigger device update via Cloudflare Tunnel
        run: |
          RESPONSE=$(curl -X POST \
            -H "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            --silent \
            --write-out "\n\nHTTP Status: %{http_code}\nTime Total: %{time_total}s\n" \
            --retry 3 \
            --retry-delay 5 \
            "https://derog-hc-deploy.jaggi.xyz/apply-config.sh")

          # Extract body and status
          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -1 | sed 's/HTTP_STATUS://')

          echo "=== Response Body ==="
          echo "$BODY"
          echo "=== HTTP Status: $STATUS ==="

          # Fail if not 2xx
          if [[ ! "$STATUS" =~ ^2 ]]; then
            exit 1
          fi
