services:
  # Cloudflare Tunnel
  cloudflared:
    image: cloudflare/cloudflared:2026.3.0  # Pinned version für Renovate
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - homelab

  # Home Assistant
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.4.4  # Pinned version
    container_name: homeassistant
    restart: unless-stopped
    privileged: true
    environment:
      - TZ=Europe/Zurich
      - DISABLE_JEMALLOC=true  # Wichtig für ARM64 mit >4K page size
    volumes:
      - ./services/homeassistant/config:/config
      - /run/dbus:/run/dbus:ro
      - /dev/serial/by-id:/dev/serial/by-id  # Allows HA to see all serial devices
    devices:
      # - /dev/ttyUSB0:/dev/ttyUSB0   # Simple mapping
      # OR use persistent by-id path (recommended):
      - /dev/serial/by-id/usb-Nabu_Casa_SkyConnect_v1.0_6a14042b4d43ed11b1f047ab2a61ed69-if00-port0:/dev/ttyUSB0
    network_mode: host

  # FreePBX
  freepbx:
    image: ghcr.io/elraro/freepbx-asterisk-arm:latest
    container_name: freepbx
    # restart: unless-stopped
    # privileged: true
    # environment:
    #   - TZ=Europe/Zurich
    #   - DB_HOST=freepbx-db
    #   - DB_NAME=asterisk
    #   - DB_USER=asterisk
    #   - DB_PASS=${FREEPBX_DB_PASS}
    # volumes:
    #   - ./services/freepbx/data:/data
    #   - ./services/freepbx/logs:/var/log
    #   - ./services/freepbx/certs:/certs
    # ports:
    #   - "80:80"
    #   - "443:443"
    #   - "5060:5060/udp"
    #   - "5160:5160/udp"
    #   - "18000-20000:18000-20000/udp"  # Note: default RTP range is 18000-20000

    ports:
     #### If you aren't using a reverse proxy
      - 8099:80
     #### If you want SSL Support and not using a reverse proxy
      - 8443:443
      - 5060:5060/udp
      - 5160:5160/udp
      - 18000-18100:18000-18100/udp
     #### Flash Operator Panel
      - 4445:4445
    volumes:
      - ./services/freepbx/certs:/certs
      - ./services/freepbx/data:/data
      - ./services/freepbx/logs:/var/log
      - ./services/freepbx/www:/var/www/html
      - type: tmpfs
        target: /run
        tmpfs:
          mode: 1777
     ### Only Enable this option below if you set DB_EMBEDDED=TRUE
     # - ./test/db:/var/lib/mysql
     ### You can drop custom files overtop of the image if you have made modifications to modules/css/whatever - Use with care
     #- ./assets/custom:/assets/custom

    environment:
      - VIRTUAL_HOST=asterisk.local
      - VIRTUAL_NETWORK=nginx-proxy
     ### If you want to connect to the SSL Enabled Container
     #- VIRTUAL_PORT=443
     #- VIRTUAL_PROTO=https
      - VIRTUAL_PORT=80
      # - LETSENCRYPT_HOST=hostname.example.com
      # - LETSENCRYPT_EMAIL=email@example.com

      - ZABBIX_HOSTNAME=freepbx-app

      - RTP_START=18000
      - RTP_FINISH=18100

     ## Use for External MySQL Server
      - DB_EMBEDDED=FALSE
      - DEBUG_MODE=TRUE
    
     ### These are only necessary if DB_EMBEDDED=FALSE
      - DB_HOST=freepbx-db
      - DB_PORT=3306
      - DB_NAME=asterisk
      - DB_USER=asterisk
      - DB_PASS=${FREEPBX_DB_PASS}

     ### If you are using TLS Support for Apache to listen on 443 in the container drop them in /certs and set these:
     #- TLS_CERT=cert.pem
     #- TLS_KEY=key.pem

    restart: unless-stopped
    # network_mode: "bridge"
    networks:
      - homelab
    depends_on:
      - freepbx-db

    ### These final lines are for Fail2ban. If you don't want, comment and also add ENABLE_FAIL2BAN=FALSE to your environment
    # cap_add:
    #   - NET_ADMIN
    # privileged: true



  freepbx-db:
    image: mariadb:10.11
    container_name: freepbx-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${FREEPBX_DB_ROOT_PASS}
      - MYSQL_DATABASE=asterisk
      - MYSQL_USER=asterisk
      - MYSQL_PASSWORD=${FREEPBX_DB_PASS}
    volumes:
      - ./services/freepbx/db:/var/lib/mysql
    networks:
      - homelab

  # Node-RED
  nodered:
    image: nodered/node-red:4.1.8  # Pinned version
    container_name: nodered
    restart: unless-stopped
    environment:
      - TZ=Europe/Zurich
    volumes:
      - ./services/nodered:/data
    ports:
      - "1880:1880"
    networks:
      - homelab

networks:
  homelab:
    driver: bridge
